name: Version Check and Bump

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  version-management:
    # Verhindert, dass die Action für PRs ausgeführt wird, die bereits 'skip-version-check' Label haben
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # Nutzt den HEAD des PR-Branches für Schreibzugriff
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Get version from PR branch
        id: pr_version
        run: |
          # Nutzt den Maven-Wrapper aus dem Repository
          chmod +x mvnw
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get version from main branch
        id: main_version
        run: |
          # Holt nur die pom.xml vom main-Branch ohne kompletten Checkout
          git fetch origin main
          VERSION=$(git show origin/main:pom.xml | grep -oPm1 "(?<=<version>)[^<]+" | head -n 1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version if identical
        if: steps.pr_version.outputs.version == steps.main_version.outputs.version
        run: |
          CURRENT_VERSION=${{ steps.pr_version.outputs.version }}
          
          # SemVer-konformes Hochzählen des Patch-Levels
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          
          echo "Erhöhe Version von $CURRENT_VERSION auf $NEW_VERSION"
          
          ./mvnw versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false

          # Git Konfiguration
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add pom.xml
          # [skip ci] verhindert, dass dieser Commit den Build-Workflow erneut triggert
          git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
          
          # Force-push vermeiden; stattdessen normaler Push auf den Head-Ref
          git push origin HEAD:${{ github.head_ref }}
