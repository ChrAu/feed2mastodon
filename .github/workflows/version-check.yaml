name: Version Check and Bump

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  version-management:
    runs-on: ubuntu-latest # Oder Ihr self-hosted runner
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Get version from PR branch
        id: pr_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout main branch to compare
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Get version from main branch
        id: main_version
        run: |
          cd main-branch
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version if identical
        if: steps.pr_version.outputs.version == steps.main_version.outputs.version
        run: |
          # Extrahiere die Version (z.B. 0.6.0)
          CURRENT_VERSION=${{ steps.pr_version.outputs.version }}
          
          # Einfaches Beispiel: Erhöht die letzte Ziffer (Patch)
          # Erfordert 'semver' oder ein einfaches Bash-Skript
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          
          echo "Erhöhe Version von $CURRENT_VERSION auf $NEW_VERSION"
          
          # Maven Befehl zum Setzen der neuen Version in der pom.xml
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false

          # Git Konfiguration und Push
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
