name: Build

on:
  push:
    branches-ignore:
      - main
  # NEU: Trigger für Pull Requests hinzugefügt
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: quarkus_test
          POSTGRES_USER: quarkus_test
          POSTGRES_PASSWORD: quarkus_test
        ports:
          - 5439:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: write # GEÄNDERT von 'read' auf 'write' für den Version-Bump
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # WICHTIG: Erforderlich, um den main-Branch für den Vergleich zu finden


      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

