# URL des RSS/Atom-Feeds
feed.url=https://www.tagesschau.de/infoservices/alle-meldungen-100~rss2.xml

# Mastodon Konfiguration
# Die URL zu deiner Mastodon Instanz
mastodon.api.url=https://mastodon.hexix.de
# Dein Access Token (besser als Umgebungsvariable!)
mastodon.access.token=${MASTODON_ACCESS_TOKEN:key}
mastodon.private.access.token=${MASTODON_PRIVATE_ACCESS_TOKEN:key}


gemini.access.token=${GEMINIE_ACCESS_TOKEN:key}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash-lite}
gemini.embedding.model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}

local.model=${LOCAL_MODEL:granite-embedding:278m}

feed2Mastodon.minCosDistance=${MIN_COS_DISTANCE:0.825}

# Konfiguration für den REST Client
de.hexix.mastodon.resource.MastodonClient/mp-rest/url=${mastodon.api.url}
#client.resource.mastodon.de.hexix.FavouritesClient/mp-rest/url=${mastodon.api.url}

ollama-api/mp-rest/url=http://${OL_HOST:localhost}:${OL_PORT:11434}

mastodon.boost.disable=${MASTODON_BOOST_DISABLE:true}

# --- NEU: Datenbank-Konfiguration ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:dein_db_user}
quarkus.datasource.password=${POSTGRES_PASSWORD:dein_db_passwort}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:${POSTGRESQL_PORT:5432}/${POSTGRES_DB:feed2toot_db}

# --- Schema Management mit Flyway ---
# Deaktiviert das automatische Schema-Management von Hibernate
quarkus.hibernate-orm.database.generation=none

# Aktiviert Flyway, um Migrationen beim Start auszuführen
quarkus.flyway.migrate-at-start=true

# Erlaubt Flyway, auf einer bestehenden, nicht-leeren Datenbank eine Baseline zu erstellen.
quarkus.flyway.baseline-on-migrate=true

# Setzt die Baseline auf Version 0, damit unsere V1-Migration als erste ausgeführt wird.
quarkus.flyway.baseline-version=0



# Telegram Bot Configuration
telegram.bot.token=${TELEGRAM_BOT_TOKEN:emptyStringWithLengthGreater10}


# Camel Configuration
camel.main.name=TelegramBot
camel.main.duration-max-messages=0
camel.main.shutdown-timeout=60

# Logging bereinigen (reduziert JMX / MBean TRACE Logs von Camel)
quarkus.log.category."javax.management.modelmbean".level=INFO
quarkus.log.category."org.apache.camel.support.management.MBeanInfoAssembler".level=INFO

#Quinoa
quarkus.quinoa=true
quarkus.quinoa.ui-dir=src/main/webui
#quarkus.quinoa.package-manager-install=true
#quarkus.quinoa.package-manager-install.node-version=22.19.0
#quarkus.quinoa.package-manager-install.npm-version=11.9.0

#HomeAssistant
home-assistant.api.token=${HOMEASSISTANT_API_TOKEN:emptyStringWithLengthGreater10}



# Begrenzt die Anzahl der parallelen Threads massiv
quarkus.thread-pool.max-threads=10
quarkus.thread-pool.core-threads=4
# Verhindert, dass zu viele Tasks in der Warteschlange den RAM füllen
quarkus.thread-pool.queue-size=50

# Proxmox API Konfiguration
proxmox.api.token=${PROXMOX_API_TOKEN:emptyStringWithLengthGreater10}
proxmox.api.node-name=${PROXMOX_NODE_NAME:pve}

# Rest Client Verbindung
quarkus.rest-client.proxmox-api.url=${PROXMOX_API_URL:https://192.168.0.1:8006}


quarkus.mailer.auth-methods=${QUARKUS_MAILER_AUTH_METHODS:DIGEST-MD5 CRAM-SHA256 CRAM-SHA1 CRAM-MD5 PLAIN LOGIN}
quarkus.mailer.from=${QUARKUS_MAILER_FROM:test@test.dev}
quarkus.mailer.host=${QUARKUS_MAILER_HOST:mail.test.dev}
quarkus.mailer.port=${QUARKUS_MAILER_PORT:587}
quarkus.mailer.start-tls=${QUARKUS_MAILER_START_TLS:REQUIRED}
quarkus.mailer.username=${QUARKUS_MAILER_USERNAME:test@test.dev}
quarkus.mailer.password=${QUARKUS_MAILER_PASSWORD:test}

quarkus.mailer.mock=${QUARKUS_MAILER_MOCK:false}

# --- Microsoft OAuth2 Configuration ---
# Your App's Client ID from Azure Portal
microsoft.oauth.client.id=${MICROSOFT_OAUTH_CLIENT_ID:your_client_id_here}
# Your App's Client Secret from Azure Portal
microsoft.oauth.client.secret=${MICROSOFT_OAUTH_CLIENT_SECRET:your_client_secret_here}
# The Redirect URI configured in Azure Portal
microsoft.oauth.redirect.uri=${MICROSOFT_OAUTH_REDIRECT_URI:http://localhost:8080/api/oauth/callback}
# The Tenant ID (use 'consumers' for personal Microsoft accounts ONLY)
microsoft.oauth.tenant.id=${MICROSOFT_OAUTH_TENANT_ID:consumers}

# Rest Client Verbindung for Microsoft Graph API
quarkus.rest-client.microsoft-oauth-api.url=https://login.microsoftonline.com

# --- Yahoo OAuth2 Configuration ---
# Your App's Client ID from Yahoo Developer Console
yahoo.oauth.client.id=${YAHOO_OAUTH_CLIENT_ID:your_yahoo_client_id_here}
# Your App's Client Secret from Yahoo Developer Console
yahoo.oauth.client.secret=${YAHOO_OAUTH_CLIENT_SECRET:your_yahoo_client_secret_here}
# The Redirect URI configured in Yahoo Developer Console
yahoo.oauth.redirect.uri=${YAHOO_OAUTH_REDIRECT_URI:https://localhost:8080/api/oauth/callback}

# Rest Client Verbindung for Yahoo OAuth API
quarkus.rest-client.yahoo-oauth-api.url=https://api.login.yahoo.com

# Keycloak OIDC Configuration
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:https://sso.codeheap.dev/realms/codeheap}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:Web-App}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:xxx}
quarkus.oidc.application-type=${OIDC_APPLICATION_TYPE:web-app}
quarkus.keycloak.policy-enforcer.enabled=true


# --- FIX FÜR DEN FEHLER ---
# Erzwingt die Nutzung von PKCE (Proof Key for Code Exchange)
quarkus.oidc.authentication.pkce-required=true


## By default, all paths are protected and require authentication.
#quarkus.http.auth.permission.authenticated.paths=/*
#quarkus.http.auth.permission.authenticated.policy=authenticated


# Nur der Login-Pfad triggert den OIDC-Redirect
quarkus.http.auth.permission.login.paths=/api/user/login
quarkus.http.auth.permission.login.policy=authenticated

quarkus.oidc.logout.path=/logout
quarkus.oidc.post-logout-redirect-path=/

quarkus.oidc.logout.backchannel-only=true

quarkus.http.proxy.proxy-address-forwarding=true

quarkus.http.session.timeout=48h
