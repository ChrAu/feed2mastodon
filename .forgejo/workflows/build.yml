name: Build and Package

on:
  push:
    branches: [ '**' ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: quarkus_test
          POSTGRES_USER: quarkus_test
          POSTGRES_PASSWORD: quarkus_test
        # Das Port-Mapping (ports) kann hier theoretisch sogar komplett weggelassen werden,
        # da die Container im selben Netzwerk intern alle Ports offen haben.
        # Ich lasse es aber drin, falls du es für andere Zwecke brauchst.
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          # 'cache: maven' entfernt, da es in Forgejo oft zu API-Kompatibilitätsproblemen führt

      # Explizites Caching ist unter Forgejo robuster (Wir nutzen v3 für bessere Forgejo-Kompatibilität)
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Optional: Mach den Maven-Wrapper ausführbar, falls du ihn nutzt (sehr empfohlen!)
      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw || true

      - name: Build Application
        env:
          QUARKUS_DATASOURCE_USERNAME: quarkus_test
          QUARKUS_DATASOURCE_PASSWORD: quarkus_test
          # HIER IST DIE ÄNDERUNG: Host ist nun 'postgres' und Port der interne Port '5432'
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/quarkus_test
          GEMINIE_ACCESS_TOKEN: ${{ secrets.GEMINIE_ACCESS_TOKEN }}
          MASTODON_PRIVATE_ACCESS_TOKEN: ${{ secrets.MASTODON_PRIVATE_ACCESS_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          HOMEASSISTANT_API_TOKEN: ${{ secrets.HOMEASSISTANT_API_TOKEN }}
        # Nutze ./mvnw (Wrapper), falls vorhanden. Er lädt Maven selbstständig herunter, falls es fehlt.
        # Falls dein Projekt keinen Wrapper hat, ersetze "./mvnw" einfach durch "mvn".
        run: ./mvnw clean package
