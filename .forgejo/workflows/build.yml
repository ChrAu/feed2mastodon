name: Build and Package

on:
  push:
    branches: [ '**' ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: quarkus_test
          POSTGRES_USER: quarkus_test
          POSTGRES_PASSWORD: quarkus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Berechtigungen für Gitea/Forgejo Token
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wichtig für den Vergleich mit dem main-branch

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'

#      - name: Set up Node.js
#        uses: actions/setup-node@v4
#        with:
#          node-version: 'latest'

#      - name: Dump Actor
#        run: echo "Der Actor ist ${{ github.actor }}"

      # NEU: Versionsprüfung und Erhöhung für Forgejo
      - name: Check and Bump Version
        # Nur bei PRs, nicht bei Push auf Main, und nicht durch Bots
        if: github.event_name == 'pull_request' && github.actor == 'chrau'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x mvnw
          
          # Aktuelle Version im PR-Branch auslesen
          PR_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          
          # Version im Ziel-Branch (meist main) holen
          # In Forgejo/Gitea ist github.base_ref der Name des Ziel-Branches
          git fetch origin ${{ github.base_ref }}
          MAIN_VERSION=$(git show origin/${{ github.base_ref }}:pom.xml | grep -oPm1 "(?<=<version>)[^<]+" | head -n 1)

          if [ "$PR_VERSION" == "$MAIN_VERSION" ]; then
            echo "Versionen sind identisch ($PR_VERSION). Erhöhe Patch-Level..."
            
            IFS='.' read -r major minor patch <<< "$PR_VERSION"
            NEW_VERSION="$major.$minor.$((patch + 1))"
            
            ./mvnw versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false
            
            git config --global user.name "forgejo-actions[bot]"
            git config --global user.email "forgejo-actions[bot]@forgejo.codeheap.dev"
            
            git add pom.xml
            git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
            
            # Push zurück in den Head-Branch des Pull Requests
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "Version wurde bereits manuell erhöht ($PR_VERSION)."
          fi

      - name: Build with Maven Wrapper
        env:
          QUARKUS_DATASOURCE_USERNAME: quarkus_test
          QUARKUS_DATASOURCE_PASSWORD: quarkus_test
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/quarkus_test
          GEMINIE_ACCESS_TOKEN: ${{ secrets.GEMINIE_ACCESS_TOKEN }}
          MASTODON_PRIVATE_ACCESS_TOKEN: ${{ secrets.MASTODON_PRIVATE_ACCESS_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          HOMEASSISTANT_API_TOKEN: ${{ secrets.HOMEASSISTANT_API_TOKEN }}
        run: |
          chmod +x mvnw
          ./mvnw -B package -Dquarkus.profile=prod --file pom.xml