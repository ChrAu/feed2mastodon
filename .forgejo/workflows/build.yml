name: Build and Package

on:
  push:
    branches: [ '**' ] # Läuft bei jedem Push auf jeden Branch
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest # Passe das an die Labels deiner Forgejo-Runner an (z. B. 'docker' oder 'ubuntu-latest')

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: quarkus_test
          POSTGRES_USER: quarkus_test
          POSTGRES_PASSWORD: quarkus_test
        ports:
          - 5439:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: maven

      - name: Cache local Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache Tools (Maven)
        id: cache-tools
        uses: actions/cache@v3
        with:
          path: ~/.local/tools
          key: ${{ runner.os }}-tools-mvn-3.9.6

      - name: Install Maven and Docker CLI
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          # Install Docker CLI
          apt-get update
          apt-get install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
          apt-get update
          apt-get install -y docker-ce-cli
          
          # Install Maven
          mkdir -p ~/.local/tools/bin
          curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar xz -C ~/.local/tools
          ln -sf ~/.local/tools/apache-maven-3.9.6/bin/mvn ~/.local/tools/bin/mvn
          
          # wir kopieren auch die docker binary, damit wir sie leicht cachen können
          cp /usr/bin/docker ~/.local/tools/bin/docker
          cp -r /usr/libexec/docker ~/.local/tools/libexec-docker

      - name: Add Tools to PATH
        run: |
          echo "$HOME/.local/tools/bin" >> $GITHUB_PATH
          # wenn aus cache geladen, sicherstellen, dass docker libexec gefunden wird
          if [ -d "$HOME/.local/tools/libexec-docker" ] && [ ! -d "/usr/libexec/docker" ]; then
            mkdir -p /usr/libexec
            ln -sf "$HOME/.local/tools/libexec-docker" /usr/libexec/docker
          fi

      - name: Build Application with Maven
        env:
          QUARKUS_DATASOURCE_USERNAME: quarkus_test
          QUARKUS_DATASOURCE_PASSWORD: quarkus_test
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5439/quarkus_test
          GEMINIE_ACCESS_TOKEN: ${{ secrets.GEMINIE_ACCESS_TOKEN}}
          MASTODON_PRIVATE_ACCESS_TOKEN: ${{ secrets.MASTODON_PRIVATE_ACCESS_TOKEN}}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          HOMEASSISTANT_API_TOKEN: ${{ secrets.HOMEASSISTANT_API_TOKEN }}
        run: mvn clean package
