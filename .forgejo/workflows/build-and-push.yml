name: Build and Push Docker Image

on:
  push:
    branches: [ '**' ]
    tags: [ '**' ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw || true

      - name: Build Application with Maven
       	env:
          QUARKUS_DATASOURCE_USERNAME: quarkus_test
          QUARKUS_DATASOURCE_PASSWORD: quarkus_test
          # HIER IST DIE ÄNDERUNG: Host ist nun 'postgres' und Port der interne Port '5432'
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/quarkus_test
          GEMINIE_ACCESS_TOKEN: ${{ secrets.GEMINIE_ACCESS_TOKEN }}
          MASTODON_PRIVATE_ACCESS_TOKEN: ${{ secrets.MASTODON_PRIVATE_ACCESS_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          HOMEASSISTANT_API_TOKEN: ${{ secrets.HOMEASSISTANT_API_TOKEN }}
        # Wir überspringen die Tests (-DskipTests), da wir hier keine Datenbank laufen haben.
        # Die Tests werden ohnehin durch die build.yml abgedeckt.
        run: ./mvnw -Dmaven.repo.local=.m2/repository clean package -DskipTests

      - name: Install Docker CLI
        run: |
          apt-get update
          apt-get install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
          apt-get update
          apt-get install -y docker-ce-cli

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Forgejo Container Registry
        uses: docker/login-action@v4
        with:
          registry: forgejo.codeheap.dev
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CODEHEAP_TOKEN }}

      - name: Generate Docker Tags
        id: meta
        run: |
          IMAGE="forgejo.codeheap.dev/${{ github.repository_owner }}/feed2mastodon"
          REF_NAME="${{ github.ref_name }}"
          REF_TYPE="${{ github.ref_type }}"
          
          # Sanitize name for docker tag (replace / with -)
          SAFE_NAME=$(echo "${REF_NAME}" | tr '/' '-')
          
          TAGS="${IMAGE}:${SAFE_NAME}"
          
          # Add latest tag only for the main branch
          if [ "$REF_TYPE" = "branch" ] && [ "$REF_NAME" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/main/docker/Dockerfile.jvm
          push: true
          # Den Namen habe ich korrigiert (feed2mastodon) und Variablen genutzt
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
