name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Cache local Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache Tools (Maven)
        id: cache-tools
        uses: actions/cache@v3
        with:
          path: ~/.local/tools
          key: ${{ runner.os }}-tools-mvn-3.9.6

      - name: Install Maven
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/tools/bin
          curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar xz -C ~/.local/tools
          ln -sf ~/.local/tools/apache-maven-3.9.6/bin/mvn ~/.local/tools/bin/mvn

      - name: Add Tools to PATH
        run: echo "$HOME/.local/tools/bin" >> $GITHUB_PATH

      - name: Build Application with Maven
        run: mvn clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Forgejo Container Registry
        uses: docker/login-action@v3
        with:
          # registry darf das https:// nicht haben, login erwartet z.B. forgejo.codeheap.dev
          registry: forgejo.codeheap.dev
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CODEHEAP_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # tags darf auch kein https:// haben
          # Und muss komplett klein geschrieben sein (z.B. chrau statt ChrAu)
          tags: forgejo.codeheap.dev/chrau/eed2mastodon:latest
          platforms: linux/amd64
