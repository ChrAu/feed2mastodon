name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: docker

    steps:
      - name: Code auschecken
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Java einrichten
        uses: https://github.com/actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Projekt kompilieren
        # Sonar benötigt die .class Dateien für die Java-Analyse
        run: |
          chmod +x mvnw
          ./mvnw compile -DskipTests

      - name: SonarQube Scan ausführen
        # Aktualisiert auf v6 für Sicherheit und bessere Performance
        uses: https://github.com/sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mein-forgejo-projekt
            -Dsonar.sources=.
            -Dsonar.java.binaries=target/classes
            -Dsonar.verbose=true
