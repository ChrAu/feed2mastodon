name: Sonar Analyse

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Verify Java Version
        run: java -version && javac -version

      # Wir cachen jetzt einen lokalen Ordner im Workspace statt ~/.m2/repository
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Optional: Mach den Maven-Wrapper ausführbar, falls du ihn nutzt (sehr empfohlen!)
      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw || true

      - name: Build Application
        run: ./mvnw -Dmaven.repo.local=.m2/repository clean package -DskipTests

      - name: SonarQube Scan ausführen
        # Aktualisiert auf v6 für Sicherheit und bessere Performance
        uses: https://github.com/sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}:${{ github.event.repository.name }}
            -Dsonar.sources=.
            -Dsonar.java.binaries=target/classes
            -Dsonar.qualitygate.wait=true
            ${{ github.event_name == 'pull_request' && 
              format('-Dsonar.pullrequest.key={0} -Dsonar.pullrequest.branch={1} -Dsonar.pullrequest.base={2}', 
              github.event.pull_request.number, 
              github.event.pull_request.head.ref, 
              github.event.pull_request.base.ref) || 
              format('-Dsonar.branch.name={0}', github.ref_name) }}
