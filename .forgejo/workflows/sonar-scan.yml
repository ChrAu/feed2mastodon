name: Build and Package

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    # 'docker' ist das Standard-Label für Forgejo Runner.
    runs-on: docker

    steps:
      - name: Checkout Code
        uses: https://github.com/actions/checkout@v4
        with:
          # Verhindert den Shallow Clone, damit Blame-Informationen (Autoren) verfügbar sind
          fetch-depth: 0

      - name: Set up JDK 25
        uses: https://github.com/actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Cache Maven packages
        uses: https://github.com/actions/cache@v3
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw || true

      # Bereitet Git für den Scanner vor, um Blame-Warnungen zu vermeiden
      - name: Prepare Git for Sonar
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build and Sonar Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          # Wir nutzen das Maven-Plugin für Sonar. 
          # Dies löst automatisch die Warnung "sonar.java.libraries is empty".
          ./mvnw -Dmaven.repo.local=.m2/repository clean verify sonar:sonar \
            -Dsonar.projectKey=${{ github.repository_owner }}:${{ github.event.repository.name }} \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.java.binaries=target/classes
